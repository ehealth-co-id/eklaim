name: Build Windows Docker Image

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        shell: powershell
        run: |
          docker build . -t ghcr.io/ehealth-co-id/eklaim:latest
          docker push ghcr.io/ehealth-co-id/eklaim:latest